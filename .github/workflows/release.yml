name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.os }} artifacts
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runner: macos-latest
            command: npm run package:mac
            artifact_name: portiq-macos-artifacts
            artifact_path: |
              release/*.dmg
              release/*.zip
          - os: windows
            runner: windows-latest
            command: npm run package:win
            artifact_name: portiq-windows-artifacts
            artifact_path: |
              release/*.exe
          - os: linux
            runner: ubuntu-latest
            command: npm run package:linux
            artifact_name: portiq-linux-artifacts
            artifact_path: |
              release/*.AppImage
              release/*.deb
              release/*.rpm

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Use Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We have no Apple Developer ID cert in CI. Do NOT set
          # CSC_IDENTITY_AUTO_DISCOVERY=false — that also suppresses the
          # automatic ad-hoc signature electron-builder applies, and an
          # unsigned arm64 .app is rejected by macOS as "damaged" once the
          # download quarantine flag is set. With auto-discovery left on and
          # no cert present, electron-builder falls back to ad-hoc signing,
          # which makes the app launchable (users still do a one-time
          # right-click -> Open, since ad-hoc is not notarized).
        run: ${{ matrix.command }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      # Attach this OS's binaries to the release. Note: release notes are NOT
      # generated here — that runs once in the release-notes job below, so they
      # aren't written three times (once per matrix leg).
      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact_path }}

  release-notes:
    name: Publish release notes
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # Pull the human-written highlights for this tag out of CHANGELOG.md
      # (matches the "## <version>" heading; empty if none is written yet).
      - name: Extract highlights from CHANGELOG
        id: highlights
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="## ${version}" '
            $0 == ver { flag = 1; next }
            /^## / && flag { flag = 0 }
            flag { print }
          ' CHANGELOG.md > highlights.md
          # Trim leading/trailing blank lines
          sed -i -e '/./,$!d' highlights.md
          if [ -s highlights.md ]; then
            { echo "## Highlights"; echo; cat highlights.md; } > release-body.md
          else
            echo "No CHANGELOG entry found for ${version}; using generated notes only."
            : > release-body.md
          fi

      # Sets the release body once: highlights on top, then the auto-generated
      # (and categorized via .github/release.yml) "What's Changed" list.
      - name: Publish release notes
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-body.md
          generate_release_notes: true
