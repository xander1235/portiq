# Controls GitHub's auto-generated "What's Changed" list that the release
# workflow appends beneath the human-written highlights (see CHANGELOG.md and
# .github/workflows/release.yml). PRs are grouped into the categories below by
# label; the "*" catch-all captures anything unlabeled.
changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - bug
        - fix
    - title: ⚡ Performance
      labels:
        - performance
    - title: 🎨 UI & Design
      labels:
        - ui
        - design
    - title: ⬆️ Dependencies
      labels:
        - dependencies
    - title: 📝 Documentation
      labels:
        - documentation
    - title: 🧹 Other Changes
      labels:
        - "*"
